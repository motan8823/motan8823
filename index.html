<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>森颯詩 | Portfolio</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:sans-serif;
            color:white;
            overflow:hidden;
        }

        /* 背景動画 */
        #bg-video{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            object-fit:cover;
            z-index:-2;
        }

        /* 黒いフィルター */
        .overlay{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.35);
            z-index:-1;
        }

        section{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            text-align:center;
        }

        h1{
            font-size:72px;
            transition:opacity .5s;
        }

        p{
            margin-top:20px;
            font-size:24px;
            line-height:1.8;
        }
    </style>

</head>

<body>

<!-- 背景動画 -->
<video autoplay muted loop playsinline id="bg-video">
    <source src="001.mp4" type="video/mp4">
</video>

<!-- 黒いオーバーレイ -->
<div class="overlay"></div>

<section>

<h1 id="name"></h1>

<p>
幾通りもの世界を創造し、<br>
世の中にエンタメと啓発を届ける。
</p>

</section>

<script>

const names = [
    {
        text:"森 颯詩",
        font:"'Yu Mincho', serif"
    },
    {
        text:"Soshi Mori",
        font:"Arial, sans-serif"
    },
    {
        text:"MORI SOSHI",
        font:"Helvetica, sans-serif"
    },
    {
        text:"𝑺𝒐𝒔𝒉𝒊 𝑴𝒐𝒓𝒊",
        font:"cursive"
    }
];

const title = document.getElementById("name");

let index = 0;

function changeName(){

    title.style.opacity = 0;

    setTimeout(()=>{

        title.textContent = names[index].text;
        title.style.fontFamily = names[index].font;

        title.style.opacity = 1;

        index++;

        if(index >= names.length){
            index = 0;
        }

    },500);

}

changeName();

setInterval(changeName,2500);

</script>

</body>
</html>
