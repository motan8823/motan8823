<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>森颯詩 | Portfolio</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:sans-serif;
            background:#ffffff;
        }

        section{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
        }

        h1{
            font-size:72px;
        }

        p{
            margin-top:20px;
            font-size:24px;
        }
    </style>

</head>

<body>

<section>

<h1 id="name"></h1>

<p>
幾通りもの世界を創造し、<br>
世の中にエンタメと啓発を届ける。
</p>

</section>


<script>

const names = [
    {
        text:"森 颯詩",
        font:"'Yu Mincho', serif"
    },
    {
        text:"Soshi Mori",
        font:"Arial, sans-serif"
    },
    {
        text:"MORI SOSHI",
        font:"Helvetica, sans-serif"
    },
    {
        text:"𝑺𝒐𝒔𝒉𝒊 𝑴𝒐𝒓𝒊",
        font:"cursive"
    }
];

const title = document.getElementById("name");

let index = 0;

function changeName(){

    title.style.opacity = 0;

    setTimeout(()=>{

        title.textContent = names[index].text;
        title.style.fontFamily = names[index].font;

        title.style.opacity = 1;

        index++;

        if(index >= names.length){
            index = 0;
        }

    },500);

}

changeName();

setInterval(changeName,2500);

</script>
</body>
</html>
