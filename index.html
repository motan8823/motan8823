<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>森颯詩 | Portfolio</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:sans-serif;
            color:white;
            overflow:hidden;
        }

        /* 背景動画 */
        #bg-video{
            position:fixed;
            inset:0;
            width:100%;
            height:100%;
            object-fit:cover;
            z-index:-2;
        }

        /* 暗くするフィルター */
        .overlay{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.35);
            z-index:-1;
        }

        section{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            text-align:center;
            padding:20px;
        }

        h1{
            font-size:72px;
            font-weight:400;
            letter-spacing:0.08em;
        }

        h2{
            margin-top:14px;
            font-size:20px;
            font-weight:300;
            letter-spacing:0.35em;
            text-transform:uppercase;
            opacity:0.9;
        }

        p{
            margin-top:40px;
            font-size:24px;
            line-height:1.8;
        }

        @media (max-width:768px){

            h1{
                font-size:48px;
            }

            h2{
                font-size:16px;
                letter-spacing:0.25em;
            }

            p{
                font-size:18px;
            }

        }

    </style>

</head>

<body>

    <!-- 背景動画 -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="001.mp4" type="video/mp4">
    </video>

    <!-- 黒いオーバーレイ -->
    <div class="overlay"></div>

    <section>

        <h1>森 颯詩</h1>

        <h2>mori soshi</h2>

        <p>
            幾通りもの世界を創造し、<br>
            世の中にエンタメと啓発を届ける。
        </p>

    </section>

</body>
</html>
